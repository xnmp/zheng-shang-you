<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>争上游 — Zheng Shang You</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Crimson+Pro:ital,wght@0,300;0,500;0,700;1,300&family=JetBrains+Mono:wght@400;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --jade-deep: #0a1f1a;
  --jade-mid: #122e26;
  --jade-surface: #1a3d32;
  --jade-felt: #1e4a3c;
  --jade-light: #2a6b55;
  --gold: #d4a843;
  --gold-bright: #f0c95c;
  --gold-dim: #8b7332;
  --card-white: #f5f0e8;
  --card-shadow: rgba(0,0,0,0.45);
  --red-suit: #c0392b;
  --red-glow: #e74c3c;
  --black-suit: #1a1a1a;
  --wildcard-glow: #f39c12;
  --bomb-red: #ff2d2d;
  --text-primary: #e8dcc8;
  --text-dim: #8a7e6b;
  --text-bright: #fff8ec;
}

html, body {
  height: 100%;
  background: var(--jade-deep);
  color: var(--text-primary);
  font-family: 'Crimson Pro', Georgia, serif;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  background:
    radial-gradient(ellipse 120% 80% at 50% 40%, var(--jade-felt) 0%, transparent 70%),
    repeating-conic-gradient(from 0deg at 50% 50%, transparent 0deg, rgba(255,255,255,0.008) 1deg, transparent 2deg) 0 0 / 200px 200px,
    var(--jade-deep);
}

/* ══════════════ HEADER ══════════════ */

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 28px;
  background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 100%);
  border-bottom: 1px solid rgba(212,168,67,0.15);
  flex-shrink: 0;
}

.title-group {
  display: flex;
  align-items: baseline;
  gap: 14px;
}

.title-cn {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 32px;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(212,168,67,0.3);
  letter-spacing: 4px;
}

.title-en {
  font-size: 13px;
  font-weight: 300;
  font-style: italic;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
}

#new-game-btn {
  font-family: 'Crimson Pro', serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  background: transparent;
  border: 1px solid var(--gold-dim);
  padding: 8px 22px;
  cursor: pointer;
  transition: all 0.3s ease;
}

#new-game-btn:hover {
  background: rgba(212,168,67,0.1);
  border-color: var(--gold);
  box-shadow: 0 0 15px rgba(212,168,67,0.15);
}

/* ══════════════ MAIN LAYOUT ══════════════ */

.game-container {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 260px;
  grid-template-rows: auto 1fr auto;
  gap: 0;
  min-height: 0;
  overflow: hidden;
}

/* ══════════════ OPPONENTS ══════════════ */

.opponents-bar {
  grid-column: 1 / -1;
  display: flex;
  justify-content: center;
  gap: 60px;
  padding: 14px 20px;
}

.opponent {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 20px;
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px;
  transition: border-color 0.3s;
}

.opponent.active-turn {
  border-color: var(--gold-dim);
  box-shadow: 0 0 12px rgba(212,168,67,0.1);
}

.opponent-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--jade-surface);
  border: 2px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
}

.opponent-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
}

.opponent-cards {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--gold-dim);
}

.opponent-cards .count {
  color: var(--gold);
  font-weight: 600;
  font-size: 16px;
}

.opponent-out {
  color: var(--jade-light);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ══════════════ TABLE (CENTER) ══════════════ */

.table-area {
  grid-column: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 0;
  position: relative;
  padding: 10px;
}

.table-surface {
  width: 100%;
  max-width: 600px;
  min-height: 140px;
  background:
    radial-gradient(ellipse at center, rgba(42,107,85,0.3) 0%, transparent 70%),
    rgba(0,0,0,0.15);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
}

.table-label {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.table-cards {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}

.table-empty {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 22px;
  color: var(--jade-light);
  opacity: 0.6;
}

.table-combo-label {
  margin-top: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--gold-dim);
  letter-spacing: 1px;
}

.table-combo-label.bomb {
  color: var(--bomb-red);
  text-shadow: 0 0 8px rgba(255,45,45,0.4);
  animation: bomb-pulse 0.6s ease-in-out 3;
}

@keyframes bomb-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ══════════════ SIDEBAR (LOG + MOVES) ══════════════ */

.sidebar {
  grid-column: 2;
  grid-row: 2 / 4;
  display: flex;
  flex-direction: column;
  border-left: 1px solid rgba(255,255,255,0.06);
  background: rgba(0,0,0,0.2);
  min-height: 0;
  overflow: hidden;
}

.sidebar-section {
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.sidebar-section.moves-section {
  flex-shrink: 0;
  max-height: 45%;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.sidebar-section.log-section {
  flex: 1;
  min-height: 0;
}

.sidebar-heading {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold-dim);
  padding: 10px 16px 6px;
  flex-shrink: 0;
}

#moves-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 10px 10px;
}

#moves-list::-webkit-scrollbar { width: 4px; }
#moves-list::-webkit-scrollbar-track { background: transparent; }
#moves-list::-webkit-scrollbar-thumb { background: var(--jade-light); border-radius: 2px; }

.move-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 7px 12px;
  margin-bottom: 4px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 5px;
  color: var(--text-primary);
  font-family: 'Crimson Pro', serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: left;
}

.move-btn:hover {
  background: rgba(212,168,67,0.08);
  border-color: rgba(212,168,67,0.25);
}

.move-btn:active {
  transform: scale(0.98);
}

.move-btn.selected {
  background: rgba(212,168,67,0.12);
  border-color: var(--gold-dim);
}

.move-btn .move-label {
  font-weight: 500;
  min-width: 72px;
  flex-shrink: 0;
}

.move-btn .move-cards {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.move-btn .move-cards .red { color: var(--red-suit); }

.move-btn.bomb-move {
  border-color: rgba(255,45,45,0.3);
  background: rgba(255,45,45,0.06);
}

.move-btn.bomb-move:hover {
  border-color: rgba(255,45,45,0.5);
  background: rgba(255,45,45,0.1);
}

.move-btn.bomb-move .move-label {
  color: var(--bomb-red);
}

.move-btn.pass-move {
  opacity: 0.6;
}

.move-btn.pass-move:hover {
  opacity: 0.85;
}

.move-btn.selection-match {
  background: rgba(212,168,67,0.15);
  border-color: var(--gold);
  box-shadow: 0 0 8px rgba(212,168,67,0.15);
}

.move-btn.filtered-out {
  display: none;
}

#game-log {
  flex: 1;
  overflow-y: auto;
  padding: 4px 16px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  line-height: 1.7;
  color: var(--text-dim);
}

#game-log::-webkit-scrollbar { width: 4px; }
#game-log::-webkit-scrollbar-track { background: transparent; }
#game-log::-webkit-scrollbar-thumb { background: var(--jade-light); border-radius: 2px; }

.log-entry { padding: 1px 0; }
.log-entry.player-action { color: var(--gold); }
.log-entry.highlight { color: var(--text-bright); }

/* ══════════════ HAND AREA ══════════════ */

.hand-area {
  grid-column: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 20px 16px;
  background: linear-gradient(0deg, rgba(0,0,0,0.35) 0%, transparent 100%);
  border-top: 1px solid rgba(255,255,255,0.04);
  min-height: 0;
}

.hand-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 6px;
}

.hand-label {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold-dim);
}

.turn-indicator {
  font-size: 11px;
  color: var(--gold-bright);
  opacity: 0;
  transition: opacity 0.3s;
  letter-spacing: 1px;
}

.turn-indicator.active {
  opacity: 1;
  animation: turn-glow 1.5s ease-in-out infinite;
}

@keyframes turn-glow {
  0%, 100% { text-shadow: 0 0 6px rgba(240,201,92,0.3); }
  50% { text-shadow: 0 0 14px rgba(240,201,92,0.6); }
}

#hand-cards {
  display: flex;
  gap: 3px;
  justify-content: center;
  flex-wrap: nowrap;
  padding: 4px 8px;
  min-height: 100px;
  max-width: 100%;
  overflow-x: auto;
}

#hand-cards::-webkit-scrollbar { height: 3px; }
#hand-cards::-webkit-scrollbar-track { background: transparent; }
#hand-cards::-webkit-scrollbar-thumb { background: var(--jade-light); border-radius: 2px; }

/* ══════════════ CARDS ══════════════ */

.card {
  width: 56px;
  height: 82px;
  background: var(--card-white);
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: grab;
  user-select: none;
  position: relative;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  box-shadow: 0 2px 6px var(--card-shadow), 0 0 0 1px rgba(0,0,0,0.1);
  flex-shrink: 0;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 6px 16px var(--card-shadow), 0 0 0 1px rgba(0,0,0,0.15);
  z-index: 10;
}

.card.selected {
  transform: translateY(-16px);
  box-shadow: 0 12px 24px var(--card-shadow), 0 0 12px rgba(212,168,67,0.3);
  z-index: 20;
}

.card .card-rank {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 600;
  line-height: 1;
}

.card .card-suit {
  font-size: 18px;
  line-height: 1;
  margin-top: 2px;
}

.card.red-card .card-rank,
.card.red-card .card-suit {
  color: var(--red-suit);
}

.card.black-card .card-rank,
.card.black-card .card-suit {
  color: var(--black-suit);
}

.card.joker-card {
  background: linear-gradient(135deg, #f5f0e8 0%, #e8dcc8 100%);
}

.card.joker-card .card-rank {
  font-size: 24px;
}

.card.joker-card.red-card .card-rank {
  color: var(--red-suit);
}

.card.wildcard-card {
  background: linear-gradient(135deg, #fff8e1 0%, #ffe082 50%, #fff8e1 100%);
  box-shadow: 0 2px 6px var(--card-shadow), 0 0 10px rgba(243,156,18,0.25);
}

.card.wildcard-card::before {
  content: '★';
  position: absolute;
  top: 3px;
  left: 5px;
  font-size: 9px;
  color: var(--wildcard-glow);
}

/* Table card (smaller) */
.table-cards .card {
  width: 46px;
  height: 68px;
  cursor: default;
}

.table-cards .card .card-rank { font-size: 16px; }
.table-cards .card .card-suit { font-size: 14px; }

/* Sortable ghost */
.sortable-ghost {
  opacity: 0.4;
}

.sortable-chosen {
  cursor: grabbing;
}

/* ══════════════ GAME OVER OVERLAY ══════════════ */

#game-over-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}

#game-over-overlay.visible {
  display: flex;
}

.game-over-card {
  text-align: center;
  padding: 48px 64px;
  background: var(--jade-mid);
  border: 1px solid var(--gold-dim);
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.game-over-card h2 {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 42px;
  color: var(--gold);
  margin-bottom: 8px;
}

.game-over-card .result {
  font-size: 18px;
  color: var(--text-primary);
  margin-bottom: 24px;
}

.game-over-card .result.won { color: var(--gold-bright); }
.game-over-card .result.lost { color: var(--red-suit); }

.game-over-card button {
  font-family: 'Crimson Pro', serif;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--jade-deep);
  background: var(--gold);
  border: none;
  padding: 12px 36px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}

.game-over-card button:hover {
  background: var(--gold-bright);
  box-shadow: 0 0 20px rgba(212,168,67,0.3);
}

/* ══════════════ CONNECTING STATE ══════════════ */

#connecting-overlay {
  position: fixed;
  inset: 0;
  background: var(--jade-deep);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
  transition: opacity 0.5s;
}

#connecting-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.connecting-text {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 28px;
  color: var(--gold);
  letter-spacing: 6px;
}

.connecting-dots {
  display: flex;
  gap: 8px;
}

.connecting-dots span {
  width: 8px;
  height: 8px;
  background: var(--gold-dim);
  border-radius: 50%;
  animation: dot-bounce 1.2s ease-in-out infinite;
}

.connecting-dots span:nth-child(2) { animation-delay: 0.2s; }
.connecting-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dot-bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-8px); opacity: 1; }
}

/* ══════════════ RESPONSIVE ══════════════ */

@media (max-width: 900px) {
  .game-container {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr auto auto;
  }
  .sidebar {
    grid-column: 1;
    grid-row: 4;
    flex-direction: row;
    border-left: none;
    border-top: 1px solid rgba(255,255,255,0.06);
    max-height: 160px;
  }
  .sidebar-section { flex: 1; }
}
</style>
</head>
<body>

<div id="connecting-overlay">
  <div class="connecting-text">争上游</div>
  <div class="connecting-dots"><span></span><span></span><span></span></div>
</div>

<header>
  <div class="title-group">
    <span class="title-cn">争上游</span>
    <span class="title-en">Zheng Shang You</span>
  </div>
  <button id="new-game-btn">New Game</button>
</header>

<div class="game-container">
  <div class="opponents-bar" id="opponents-bar"></div>

  <div class="table-area">
    <div class="table-surface">
      <div class="table-label">Current Trick</div>
      <div class="table-cards" id="table-cards"></div>
      <div class="table-empty" id="table-empty">自由出牌</div>
      <div class="table-combo-label" id="table-combo-label"></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-section moves-section">
      <div class="sidebar-heading">Legal Moves</div>
      <div id="moves-list"></div>
    </div>
    <div class="sidebar-section log-section">
      <div class="sidebar-heading">Game Log</div>
      <div id="game-log"></div>
    </div>
  </div>

  <div class="hand-area">
    <div class="hand-header">
      <span class="hand-label">Your Hand</span>
      <span class="turn-indicator" id="turn-indicator">— Your Turn —</span>
    </div>
    <div id="hand-cards"></div>
  </div>
</div>

<div id="game-over-overlay">
  <div class="game-over-card">
    <h2 id="game-over-title"></h2>
    <div class="result" id="game-over-result"></div>
    <button id="game-over-new-game">Play Again</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── State ──
  let ws = null;
  let currentMoves = [];
  let selectedMoveIndex = -1;
  let handSortable = null;
  let gameState = null;

  // ── DOM refs ──
  const $opponents = document.getElementById('opponents-bar');
  const $tableCards = document.getElementById('table-cards');
  const $tableEmpty = document.getElementById('table-empty');
  const $tableComboLabel = document.getElementById('table-combo-label');
  const $movesList = document.getElementById('moves-list');
  const $gameLog = document.getElementById('game-log');
  const $handCards = document.getElementById('hand-cards');
  const $turnIndicator = document.getElementById('turn-indicator');
  const $connectingOverlay = document.getElementById('connecting-overlay');
  const $gameOverOverlay = document.getElementById('game-over-overlay');
  const $gameOverTitle = document.getElementById('game-over-title');
  const $gameOverResult = document.getElementById('game-over-result');

  // ── Card rendering ──

  function createCardEl(cardData, small) {
    const el = document.createElement('div');
    el.className = 'card';

    if (cardData.is_joker) {
      el.classList.add('joker-card');
      if (cardData.suit === 5) {
        el.classList.add('red-card');
        el.innerHTML = '<span class="card-rank">🃏</span><span class="card-suit" style="font-size:10px">BIG</span>';
      } else {
        el.classList.add('black-card');
        el.innerHTML = '<span class="card-rank">🃏</span><span class="card-suit" style="font-size:10px">sm</span>';
      }
    } else {
      el.classList.add(cardData.is_red ? 'red-card' : 'black-card');
      if (cardData.is_wildcard) el.classList.add('wildcard-card');
      el.innerHTML = `<span class="card-rank">${cardData.rank_symbol}</span><span class="card-suit">${cardData.suit_symbol}</span>`;
    }

    if (cardData.id) el.dataset.cardId = cardData.id;
    return el;
  }

  // ── Render functions ──

  function renderOpponents(state) {
    $opponents.innerHTML = '';
    for (let i = 0; i < state.num_players; i++) {
      if (i === state.human_player) continue;
      const opp = document.createElement('div');
      opp.className = 'opponent';
      if (state.current_player === i && state.phase === 'PLAYING') {
        opp.classList.add('active-turn');
      }
      const count = state.cards_remaining[i];
      const isOut = count === 0;
      opp.innerHTML = `
        <div class="opponent-avatar">P${i}</div>
        <div>
          <div class="opponent-name">Player ${i}</div>
          ${isOut
            ? '<div class="opponent-out">Finished</div>'
            : `<div class="opponent-cards"><span class="count">${count}</span> cards</div>`
          }
        </div>
      `;
      $opponents.appendChild(opp);
    }
  }

  function renderTable(state) {
    $tableCards.innerHTML = '';
    if (state.active_combo) {
      $tableEmpty.style.display = 'none';
      state.active_combo.cards.forEach(c => {
        $tableCards.appendChild(createCardEl(c, true));
      });
      const label = state.active_combo.label + (state.active_combo.is_bomb ? ' 💣' : '') + ` — P${state.active_combo.player}`;
      $tableComboLabel.textContent = label;
      $tableComboLabel.className = 'table-combo-label' + (state.active_combo.is_bomb ? ' bomb' : '');
      $tableComboLabel.style.display = '';
    } else {
      $tableEmpty.style.display = '';
      $tableComboLabel.style.display = 'none';
    }
  }

  function getSelectedCardIds() {
    return [...$handCards.querySelectorAll('.card.selected')].map(el => el.dataset.cardId);
  }

  function onCardSelectionChanged() {
    // Filter and highlight moves matching the selected cards
    if (!currentMoves.length) return;
    const selectedIds = getSelectedCardIds().sort();

    const btns = $movesList.querySelectorAll('.move-btn');
    if (selectedIds.length === 0) {
      // No selection — show all moves normally
      btns.forEach(b => {
        b.classList.remove('filtered-out', 'selection-match');
        b.style.display = '';
      });
      selectedMoveIndex = -1;
      return;
    }

    // Find moves whose hand_card_ids match the selected set exactly
    let matchCount = 0;
    let lastMatchIdx = -1;
    btns.forEach((btn, i) => {
      const move = currentMoves[i];
      const moveIds = (move.hand_card_ids || []).slice().sort();
      const matches = selectedIds.length === moveIds.length &&
        selectedIds.every((id, j) => id === moveIds[j]);
      if (matches) {
        btn.classList.add('selection-match');
        btn.classList.remove('filtered-out');
        btn.style.display = '';
        matchCount++;
        lastMatchIdx = i;
      } else if (move.is_pass) {
        // Always keep pass visible
        btn.classList.remove('selection-match', 'filtered-out');
        btn.style.display = '';
      } else {
        btn.classList.add('filtered-out');
        btn.classList.remove('selection-match');
        btn.style.display = 'none';
      }
    });

    // If exactly one match, auto-select it
    if (matchCount === 1) {
      selectedMoveIndex = lastMatchIdx;
      btns.forEach((b, i) => b.classList.toggle('selected', i === lastMatchIdx));
    } else {
      selectedMoveIndex = -1;
    }
  }

  function renderHand(state) {
    // Preserve user's custom order if they've rearranged
    const existingIds = [...$handCards.children].map(el => el.dataset.cardId);
    const newIds = state.hand.map(c => c.id);

    // Check if hand changed (cards played/received)
    const same = existingIds.length === newIds.length && existingIds.every((id, i) => newIds.includes(id));

    if (!same) {
      // Hand changed — full re-render, but try to preserve custom ordering
      const cardMap = {};
      state.hand.forEach(c => { cardMap[c.id] = c; });

      // Keep cards that still exist in their current order, append new ones
      const preserved = existingIds.filter(id => cardMap[id]);
      const brandNew = newIds.filter(id => !preserved.includes(id));
      const orderedIds = [...preserved, ...brandNew];

      $handCards.innerHTML = '';
      orderedIds.forEach(id => {
        if (cardMap[id]) {
          const el = createCardEl(cardMap[id]);
          el.addEventListener('click', () => {
            el.classList.toggle('selected');
            onCardSelectionChanged();
          });
          $handCards.appendChild(el);
        }
      });

      initSortable();
    }

    // Turn indicator
    if (state.is_human_turn) {
      $turnIndicator.classList.add('active');
    } else {
      $turnIndicator.classList.remove('active');
    }
  }

  function renderMoves(moves) {
    currentMoves = moves;
    selectedMoveIndex = -1;
    $movesList.innerHTML = '';

    if (!moves || moves.length === 0) {
      $movesList.innerHTML = '<div style="padding:8px;color:var(--text-dim);font-size:12px;">Waiting...</div>';
      return;
    }

    moves.forEach((move, idx) => {
      const btn = document.createElement('button');
      btn.className = 'move-btn';
      if (move.is_pass) btn.classList.add('pass-move');
      if (move.is_bomb) btn.classList.add('bomb-move');

      let cardsHtml = '';
      if (!move.is_pass) {
        cardsHtml = move.cards.map(c => {
          const cls = c.is_red ? 'red' : '';
          return `<span class="${cls}">${c.rank_symbol}${c.suit_symbol}</span>`;
        }).join(' ');
      }

      btn.innerHTML = `
        <span class="move-label">${move.is_bomb ? '💣 ' : ''}${move.label}</span>
        <span class="move-cards">${cardsHtml}</span>
      `;

      btn.addEventListener('click', () => playMove(idx));
      $movesList.appendChild(btn);
    });
  }

  function addLog(text) {
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    if (text.startsWith('[You]')) entry.classList.add('player-action');
    if (text.includes('GAME OVER') || text.includes('WIN')) entry.classList.add('highlight');
    entry.textContent = text;
    $gameLog.appendChild(entry);
    $gameLog.scrollTop = $gameLog.scrollHeight;
  }

  function showGameOver(data) {
    $gameOverOverlay.classList.add('visible');
    if (data.human_won) {
      $gameOverTitle.textContent = '你赢了！';
      $gameOverResult.textContent = 'Victory!';
      $gameOverResult.className = 'result won';
    } else {
      $gameOverTitle.textContent = '游戏结束';
      $gameOverResult.textContent = `Player ${data.winner} wins. Finish order: ${data.finish_order.join(' → ')}`;
      $gameOverResult.className = 'result lost';
    }
  }

  // ── Actions ──

  function playMove(index) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'play_move', index }));
      // Clear selection and moves immediately for responsiveness
      $handCards.querySelectorAll('.card.selected').forEach(el => el.classList.remove('selected'));
      $movesList.innerHTML = '<div style="padding:8px;color:var(--text-dim);font-size:12px;">Waiting...</div>';
      currentMoves = [];
      selectedMoveIndex = -1;
    }
  }

  function newGame() {
    $gameOverOverlay.classList.remove('visible');
    $gameLog.innerHTML = '';
    $movesList.innerHTML = '';
    $handCards.innerHTML = '';
    $tableCards.innerHTML = '';
    $tableEmpty.style.display = '';
    $tableComboLabel.style.display = 'none';
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'new_game' }));
    }
  }

  // ── Keyboard shortcuts ──

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      // Deselect all cards
      $handCards.querySelectorAll('.card.selected').forEach(el => el.classList.remove('selected'));
      onCardSelectionChanged();
      return;
    }

    if (!currentMoves.length) return;

    if (e.key === 'p' || e.key === 'P') {
      const passIdx = currentMoves.findIndex(m => m.is_pass);
      if (passIdx >= 0) playMove(passIdx);
    } else if (e.key === 'ArrowUp' || e.key === 'k') {
      e.preventDefault();
      navigateMoves(-1);
    } else if (e.key === 'ArrowDown' || e.key === 'j') {
      e.preventDefault();
      navigateMoves(1);
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (selectedMoveIndex >= 0) playMove(selectedMoveIndex);
    }
  });

  function navigateMoves(dir) {
    const btns = $movesList.querySelectorAll('.move-btn');
    if (!btns.length) return;

    if (selectedMoveIndex < 0) {
      selectedMoveIndex = dir > 0 ? 0 : btns.length - 1;
    } else {
      selectedMoveIndex = (selectedMoveIndex + dir + btns.length) % btns.length;
    }

    btns.forEach((b, i) => b.classList.toggle('selected', i === selectedMoveIndex));
    btns[selectedMoveIndex].scrollIntoView({ block: 'nearest' });
  }

  // ── SortableJS ──

  function initSortable() {
    if (handSortable) handSortable.destroy();
    handSortable = Sortable.create($handCards, {
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
    });
  }

  // ── WebSocket ──

  function connect() {
    const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${protocol}://${location.host}/ws`);

    ws.onopen = () => {
      $connectingOverlay.classList.add('hidden');
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);

      switch (msg.type) {
        case 'state':
          gameState = msg;
          renderOpponents(msg);
          renderTable(msg);
          renderHand(msg);
          break;

        case 'moves':
          renderMoves(msg.moves);
          break;

        case 'log':
          addLog(msg.text);
          break;

        case 'game_over':
          showGameOver(msg);
          break;
      }
    };

    ws.onclose = () => {
      $connectingOverlay.classList.remove('hidden');
      setTimeout(connect, 2000);
    };

    ws.onerror = () => {
      ws.close();
    };
  }

  // ── Init ──

  document.getElementById('new-game-btn').addEventListener('click', newGame);
  document.getElementById('game-over-new-game').addEventListener('click', newGame);

  connect();
})();
</script>
</body>
</html>
